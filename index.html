<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Habit Tracker</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Habitudes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f2f2f7;
      color: #111;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      padding: 22px 0;
    }

    h1 {
      font-size: 34px;
      margin: 8px 0 18px;
      letter-spacing: -1px;
    }

    .month-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .month-title {
      font-size: 22px;
      font-weight: 800;
      text-transform: capitalize;
    }

    button {
      border: 0;
      cursor: pointer;
      font-weight: 800;
    }

    .arrow {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: white;
      color: #007aff;
      font-size: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .choice {
      min-height: 48px;
      border-radius: 15px;
      color: white;
      font-size: 13px;
      opacity: .55;
      transition: .15s;
    }

    .choice.active {
      opacity: 1;
      transform: scale(1.03);
      outline: 3px solid #111;
    }

    .green { background: #34c759; }
    .red { background: #ff3b30; }
    .black { background: #000; }
    .neutral { background: #8e8e93; }

    .week, .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .week {
      margin-bottom: 8px;
    }

    .week div {
      text-align: center;
      color: #8e8e93;
      font-size: 13px;
      font-weight: 800;
    }

    .day {
      height: 46px;
      border-radius: 13px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      user-select: none;
    }

    .day:active {
      transform: scale(.93);
    }

    .empty {
      background: transparent;
      box-shadow: none;
      pointer-events: none;
    }

    .done {
      background: #34c759;
      color: white;
    }

    .failed {
      background: #ff3b30;
      color: white;
    }

    .exempt {
      background: #000;
      color: white;
    }

    .today {
      outline: 3px solid #007aff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 14px 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }

    .number {
      font-size: 25px;
      font-weight: 900;
    }

    .label {
      color: #8e8e93;
      font-size: 12px;
      font-weight: 700;
      margin-top: 4px;
    }

    .success {
      margin-top: 12px;
      background: white;
      border-radius: 18px;
      padding: 15px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }

    .hint {
      margin-top: 14px;
      color: #8e8e93;
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>Habitudes</h1>

    <section class="month-bar">
      <button class="arrow" onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="arrow" onclick="changeMonth(1)">›</button>
    </section>

    <section class="choices">
      <button id="doneBtn" class="choice green active" onclick="setMode('done')">Vert</button>
      <button id="failedBtn" class="choice red" onclick="setMode('failed')">Rouge</button>
      <button id="exemptBtn" class="choice black" onclick="setMode('exempt')">Exempt</button>
      <button id="clearBtn" class="choice neutral" onclick="setMode('clear')">Annuler</button>
    </section>

    <section class="week">
      <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
    </section>

    <section class="calendar" id="calendar"></section>

    <section class="stats">
      <div class="card">
        <div class="number" id="doneCount">0</div>
        <div class="label">réussis</div>
      </div>
      <div class="card">
        <div class="number" id="failedCount">0</div>
        <div class="label">ratés</div>
      </div>
      <div class="card">
        <div class="number" id="exemptCount">0</div>
        <div class="label">exemptés</div>
      </div>
    </section>

    <section class="success" id="successRate">Réussite : 0%</section>

    <p class="hint">
      Les jours noirs sont exclus du calcul. Le bouton Annuler remet un jour en neutre.
    </p>
  </main>

<script>
  const STORAGE_KEY = "habit_tracker_v4_marks";

  let currentDate = new Date();
  let mode = "done";
  let marks = loadMarks();

  function loadMarks() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch {
      return {};
    }
  }

  function saveMarks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(marks));
  }

  function setMode(newMode) {
    mode = newMode;

    doneBtn.classList.toggle("active", mode === "done");
    failedBtn.classList.toggle("active", mode === "failed");
    exemptBtn.classList.toggle("active", mode === "exempt");
    clearBtn.classList.toggle("active", mode === "clear");
  }

  function changeMonth(value) {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + value, 1);
    render();
  }

  function dayKey(day) {
    const year = currentDate.getFullYear();
    const month = String(currentDate.getMonth() + 1).padStart(2, "0");
    const date = String(day).padStart(2, "0");
    return `${year}-${month}-${date}`;
  }

  function render() {
    calendar.innerHTML = "";

    monthTitle.textContent = currentDate.toLocaleDateString("fr-FR", {
      month: "long",
      year: "numeric"
    });

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);

    let offset = firstDay.getDay() - 1;
    if (offset < 0) offset = 6;

    for (let i = 0; i < offset; i++) {
      const empty = document.createElement("div");
      empty.className = "day empty";
      calendar.appendChild(empty);
    }

    const today = new Date();

    for (let day = 1; day <= lastDay.getDate(); day++) {
      const cell = document.createElement("div");
      const key = dayKey(day);

      cell.className = "day";
      cell.textContent = day;

      if (marks[key]) cell.classList.add(marks[key]);

      const isToday =
        today.getFullYear() === year &&
        today.getMonth() === month &&
        today.getDate() === day;

      if (isToday) cell.classList.add("today");

      cell.onclick = () => {
        if (mode === "clear") {
          delete marks[key];
        } else {
          marks[key] = mode;
        }

        saveMarks();
        render();
      };

      calendar.appendChild(cell);
    }

    updateStats();
  }

  function updateStats() {
    const prefix = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, "0")}-`;

    let done = 0;
    let failed = 0;
    let exempt = 0;

    Object.entries(marks).forEach(([key, value]) => {
      if (!key.startsWith(prefix)) return;

      if (value === "done") done++;
      if (value === "failed") failed++;
      if (value === "exempt") exempt++;
    });

    doneCount.textContent = done;
    failedCount.textContent = failed;
    exemptCount.textContent = exempt;

    const totalCounted = done + failed;
    const rate = totalCounted === 0 ? 0 : Math.round((done / totalCounted) * 100);
    successRate.textContent = `Réussite : ${rate}%`;
  }

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js");
    });
  }

  render();
</script>
</body>
</html>
